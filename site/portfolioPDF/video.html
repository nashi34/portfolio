<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualizador de Vídeo | David Lopes</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    .player-container {
      width: 100%;
      max-width: 1000px;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    video {
      width: 100%;
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      background-color: #000;
      outline: none;
    }
  </style>
</head>
<body>
  <div class="player-container">
    <video id="video-player" controls autoplay>
      O seu navegador não suporta a reprodução deste vídeo.
    </video>
  </div>

  <script>
    // Obter o parâmetro 'src' do URL
    const urlParams = new URLSearchParams(window.location.search);
    const videoSrc = urlParams.get('src');
    const player = document.getElementById('video-player');

    if (videoSrc) {
      player.src = "../" + videoSrc;
      
      // Definir o volume para 10% (0.1)
      player.volume = 0.1;
      
      const fileName = videoSrc.split('/').pop().replace(/_/g, ' ');
      document.title = `${fileName} | David Lopes`;
    } else {
      document.body.innerHTML = '<p style="color: #94a3b8; font-size: 1.2rem;">Vídeo não encontrado.</p>';
    }
  </script>
</body>
</html>
